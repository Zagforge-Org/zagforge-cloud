version: "3"

vars:
    COMPOSE_FILE: docker-compose.dev.yaml
    DC: docker compose -f {{.COMPOSE_FILE}}

includes:
    deploy:
        taskfile: Taskfile.deploy.yml

tasks:
    build:
        desc: Run tests and build all binaries
        cmds:
            - task: test
            - task: build:server
            - task: build:worker

    build:server:
        desc: Build the server binary
        cmds:
            - "{{.DC}} run --rm --no-deps api go build -o .bin/server ./cmd/"

    build:worker:
        desc: Build the zagforge-worker wrapper binary
        cmds:
            - "{{.DC}} run --rm --no-deps api sh -c 'cd /app && go build -o .bin/zagforge-worker ./worker/cmd/'"

    test:
        desc: Run all tests with race detection
        cmds:
            - "{{.DC}} run --rm --no-deps api sh -c 'cd /app && go test -v -race -cover ./api/... ./shared/go/... ./worker/...'"

    dev:
        desc: Start all services in dev mode (postgres, migrations, api with hot-reload)
        cmds:
            - "{{.DC}} up --build"

    dev:detach:
        desc: Start all services in dev mode (detached)
        cmds:
            - "{{.DC}} up --build -d"

    down:
        desc: Stop all services
        cmds:
            - "{{.DC}} down"

    webhook:forward:
        desc: Forward GitHub webhooks to local server via smee.io
        cmds:
            - "{{.DC}} up smee"

    db:up:
        desc: Start local Postgres
        cmds:
            - "{{.DC}} up -d postgres"

    db:down:
        desc: Stop local Postgres
        cmds:
            - "{{.DC}} down"

    migrate-up:
        desc: Run all pending migrations
        cmds:
            - "{{.DC}} run --rm migrate"

    migrate-down:
        desc: Roll back the last migration
        cmds:
            - >
                {{.DC}} run --rm migrate
                migrate
                  -path /app/api/internal/db/migrations
                  -database postgres://zagforge:zagforge@postgres:5432/zagforge?sslmode=disable
                  down 1

    migrate-create:
        desc: Create a new migration file. Pass NAME=description
        vars:
            NAME: '{{.NAME | default "change"}}'
        cmds:
            - "{{.DC}} run --rm --no-deps api sh -c 'cd /app && migrate create -ext sql -dir api/internal/db/migrations -seq {{.NAME}}'"

    db:seed:
        desc: Seed dev database with test org and repo
        cmds:
            - "{{.DC}} exec -T postgres psql -U zagforge -d zagforge -f /dev/stdin < api/internal/db/seed/dev.sql"

    logs:
        desc: Tail logs for all services
        cmds:
            - "{{.DC}} logs -f"

    logs:api:
        desc: Tail logs for the API service
        cmds:
            - "{{.DC}} logs -f api"
