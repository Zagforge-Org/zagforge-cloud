version: "3"

vars:
    COMPOSE_FILE: infra/docker-compose.dev.yaml
    DC: doppler run -- docker compose -f {{.COMPOSE_FILE}}

includes:
    deploy:
        taskfile: deploy/Taskfile.deploy.yml

tasks:
    setup:
        desc: One-time setup for new developers
        cmds:
            - git config core.hooksPath .githooks
            - doppler setup --project zagforge --config dev
            - echo "Git hooks + Doppler configured."

    build:
        desc: Run tests and build all binaries
        cmds:
            - task: test
            - task: build:server
            - task: build:worker

    build:server:
        desc: Build the server binary
        cmds:
            - "{{.DC}} run --rm --no-deps api go build -o .bin/server ./services/api/cmd/"

    build:worker:
        desc: Build the zagforge-worker wrapper binary
        cmds:
            - "{{.DC}} run --rm --no-deps api sh -c 'cd /app && go build -o .bin/zagforge-worker ./services/worker/cmd/'"

    test:
        desc: Run all tests with race detection
        cmds:
            - "{{.DC}} run --rm --no-deps api sh -c 'cd /app && go test -v -race -cover ./services/api/... ./services/shared/go/... ./services/worker/...'"

    dev:
        desc: Start all services in dev mode (secrets from Doppler)
        cmds:
            - "{{.DC}} up --build"

    dev:detach:
        desc: Start all services in dev mode (detached)
        cmds:
            - "{{.DC}} up --build -d"

    down:
        desc: Stop all services
        cmds:
            - "docker compose -f {{.COMPOSE_FILE}} down"

    webhook:forward:
        desc: Forward GitHub webhooks to local server via smee.io
        cmds:
            - "{{.DC}} up smee"

    db:up:
        desc: Start local Postgres
        cmds:
            - "docker compose -f {{.COMPOSE_FILE}} up -d postgres"

    db:down:
        desc: Stop local Postgres
        cmds:
            - "docker compose -f {{.COMPOSE_FILE}} down"

    migrate-up:
        desc: Run all pending migrations
        cmds:
            - "docker compose -f {{.COMPOSE_FILE}} run --rm migrate"

    migrate-down:
        desc: Roll back the last migration
        cmds:
            - >
                docker compose -f {{.COMPOSE_FILE}} run --rm migrate
                migrate
                  -path /app/services/api/internal/db/migrations
                  -database postgres://zagforge:zagforge@postgres:5432/zagforge?sslmode=disable
                  down 1

    migrate-create:
        desc: Create a new migration file. Pass NAME=description
        vars:
            NAME: '{{.NAME | default "change"}}'
        cmds:
            - "docker compose -f {{.COMPOSE_FILE}} run --rm --no-deps api sh -c 'cd /app && migrate create -ext sql -dir services/api/internal/db/migrations -seq {{.NAME}}'"

    db:shell:
        desc: Open a psql shell to the local dev database
        cmds:
            - "docker compose -f {{.COMPOSE_FILE}} exec postgres psql -U zagforge -d zagforge"

    db:seed:
        desc: Seed dev database with test org and repo
        cmds:
            - "docker compose -f {{.COMPOSE_FILE}} exec -T postgres psql -U zagforge -d zagforge -f /dev/stdin < services/api/internal/db/seed/dev.sql"

    logs:
        desc: Tail logs for all services
        cmds:
            - "docker compose -f {{.COMPOSE_FILE}} logs -f"

    logs:api:
        desc: Tail logs for the API service
        cmds:
            - "docker compose -f {{.COMPOSE_FILE}} logs -f api"

    test:integration:
        desc: Run integration tests (requires running Postgres + fake-gcs)
        cmds:
            - "docker compose -f {{.COMPOSE_FILE}} up -d postgres fake-gcs"
            - "docker compose -f {{.COMPOSE_FILE}} run --rm migrate"
            - go test -tags=integration -race -v ./services/api/internal/integration/...
        env:
            TEST_DATABASE_URL: postgres://zagforge:zagforge@localhost:5432/zagforge?sslmode=disable
            TEST_GCS_ENDPOINT: http://localhost:4443/storage/v1/
            TEST_GCS_BUCKET: zagforge-snapshots-test
