services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zagforge
      POSTGRES_PASSWORD: zagforge
      POSTGRES_DB: zagforge
    ports:
      - "5432:5432"
    volumes:
      - zagforge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zagforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  fake-gcs:
    image: fsouza/fake-gcs-server
    command: ["-scheme", "http", "-port", "4443", "-backend", "memory"]
    ports:
      - "4443:4443"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4443/storage/v1/b || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  zagforge_pgdata:
