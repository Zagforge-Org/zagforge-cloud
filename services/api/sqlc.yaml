version: "2"
sql:
  - engine: "postgresql"
    queries: "../shared/go/store/queries"
    schema: "internal/db/migrations"
    gen:
      go:
        package: "store"
        out: "../shared/go/store"
        sql_package: "pgx/v5"
        emit_json_tags: true
        json_tags_case_style: snake
        overrides:
          - column: "jobs.status"
            go_type:
              type: "JobStatus"
