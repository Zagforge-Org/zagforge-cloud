services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zagforge
      POSTGRES_PASSWORD: zagforge
      POSTGRES_DB: zagforge
    ports:
      - "5432:5432"
    volumes:
      - zagforge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zagforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: api/Dockerfile.dev
    command: >
      migrate
        -path /app/api/internal/db/migrations
        -database postgres://zagforge:zagforge@postgres:5432/zagforge?sslmode=disable
        up
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: api/Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      APP_ENV: dev
      PORT: "8080"
      DATABASE_URL: postgres://zagforge:zagforge@postgres:5432/zagforge?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
      GITHUB_APP_WEBHOOK_SECRET: ${GITHUB_APP_WEBHOOK_SECRET}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/readyz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile.dev
    volumes:
      - .:/app
      - ./.reports:/data/reports
    environment:
      APP_ENV: dev
      DATABASE_URL: postgres://zagforge:zagforge@postgres:5432/zagforge?sslmode=disable
      REPORTS_DIR: /data/reports
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
      GITHUB_APP_WEBHOOK_SECRET: ${GITHUB_APP_WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  smee:
    image: node:22-alpine
    command: npx smee-client --url ${SMEE_URL:-https://smee.io/StaYxmPtfVR1Vq1} --target http://api:8080/internal/webhooks/github
    depends_on:
      - api
    restart: unless-stopped

volumes:
  zagforge_pgdata:
