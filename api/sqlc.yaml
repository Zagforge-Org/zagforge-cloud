version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/queries"
    schema: "internal/db/migrations"
    gen:
      go:
        package: "dbsqlc"
        out: "internal/db/sqlc"
        sql_package: "pgx/v5"
        overrides:
          - column: "jobs.status"
            go_type:
              type: "JobStatus"
