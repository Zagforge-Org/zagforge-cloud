name: Deploy API

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  PROJECT_ID: zagforge
  SERVICE: zagforge-api

jobs:
  setup:
    name: Resolve Region
    runs-on: ubuntu-latest
    outputs:
      region: ${{ steps.region.outputs.region }}
      registry: ${{ steps.region.outputs.registry }}
    steps:
      - uses: actions/checkout@v4
      - id: region
        run: |
          REGION=$(grep '^region' infra/terraform/envs/${{ inputs.environment }}.tfvars | sed 's/.*= *"\(.*\)"/\1/')
          echo "region=$REGION" >> "$GITHUB_OUTPUT"
          echo "registry=${REGION}-docker.pkg.dev/${{ env.PROJECT_ID }}/zagforge" >> "$GITHUB_OUTPUT"

  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Lint
        run: golangci-lint run ./services/api/... ./services/shared/go/...

      - name: Test
        run: go test -race ./services/api/... ./services/shared/go/...

  deploy:
    name: Build & Deploy API (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: [ci, setup]
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ needs.setup.outputs.region }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          push: true
          tags: |
            ${{ needs.setup.outputs.registry }}/api:${{ github.sha }}
            ${{ needs.setup.outputs.registry }}/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
          platforms: linux/amd64

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Sync Doppler secrets to Cloud Run
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
        run: |
          if [ -z "$DOPPLER_TOKEN" ]; then
            echo "::error::DOPPLER_SERVICE_TOKEN secret is not set. Add it in GitHub repo settings."
            exit 1
          fi
          SECRETS=$(doppler secrets download \
            --token "$DOPPLER_TOKEN" \
            --format env-no-quotes \
            --no-file \
            | grep -v '^DOPPLER_' \
            | grep -v '^PORT=' \
            | paste -sd, -)
          if [ -z "$SECRETS" ]; then
            echo "::error::Doppler returned no secrets. Check your service token."
            exit 1
          fi
          gcloud run services update ${{ env.SERVICE }} \
            --region ${{ needs.setup.outputs.region }} \
            --set-env-vars "$SECRETS" \
            --quiet

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          image: ${{ needs.setup.outputs.registry }}/api:${{ github.sha }}
          region: ${{ needs.setup.outputs.region }}

      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile.migrate
          push: true
          tags: |
            ${{ needs.setup.outputs.registry }}/migrate:${{ github.sha }}
            ${{ needs.setup.outputs.registry }}/migrate:latest
          cache-from: type=gha,scope=migrate
          cache-to: type=gha,scope=migrate,mode=max
          platforms: linux/amd64

      - name: Update and run database migrations
        run: |
          gcloud run jobs update zagforge-migrate \
            --region ${{ needs.setup.outputs.region }} \
            --image ${{ needs.setup.outputs.registry }}/migrate:${{ github.sha }} \
            --quiet \
          && gcloud run jobs execute zagforge-migrate \
            --region ${{ needs.setup.outputs.region }} \
            --wait
