name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "shared/**"
      - "go.work"
      - "go.work.sum"

env:
  PROJECT_ID: zagforge
  REGION: us-central1
  SERVICE: zagforge-api
  REGISTRY: us-central1-docker.pkg.dev/zagforge/zagforge

jobs:
  deploy:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:${{ github.sha }}
            ${{ env.REGISTRY }}/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
          platforms: linux/amd64

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          image: ${{ env.REGISTRY }}/api:${{ github.sha }}
          region: ${{ env.REGION }}

      - name: Run database migrations
        run: |
          gcloud run jobs execute zagforge-migrate \
            --region ${{ env.REGION }} \
            --wait \
            2>/dev/null || echo "No migrate job configured yet, skipping"
