name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run ./services/api/... ./services/auth/... ./services/shared/go/... ./services/worker/...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Run tests
        run: go test -race -cover -coverprofile=coverage.out ./services/api/... ./services/auth/... ./services/shared/go/... ./services/worker/...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        target:
          - name: api
            dockerfile: services/api/Dockerfile
          - name: auth
            dockerfile: services/auth/Dockerfile
          - name: worker
            dockerfile: services/worker/Dockerfile
          - name: migrate
            dockerfile: services/api/Dockerfile.migrate
          - name: auth-migrate
            dockerfile: services/auth/Dockerfile.migrate
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.target.name }}
        run: docker build -f ${{ matrix.target.dockerfile }} -t zagforge-${{ matrix.target.name }}:ci .
