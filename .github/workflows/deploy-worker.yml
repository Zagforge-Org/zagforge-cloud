name: Deploy Worker

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  PROJECT_ID: zagforge
  REGION: us-central1
  SERVICE: zagforge-worker
  REGISTRY: us-central1-docker.pkg.dev/zagforge/zagforge

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Lint
        run: golangci-lint run ./worker/... ./shared/go/...

      - name: Test
        run: go test -race ./worker/... ./shared/go/...

  deploy:
    name: Build & Deploy Worker (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: [ci]
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: worker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/worker:${{ github.sha }}
            ${{ env.REGISTRY }}/worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max
          platforms: linux/amd64

      - name: Sync Doppler secrets to Cloud Run
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_SERVICE_TOKEN }}
        run: |
          curl -sL https://cli.doppler.com/install.sh | sh
          SECRETS=$(doppler secrets download \
            --token "$DOPPLER_TOKEN" \
            --format env-no-quotes \
            --no-file \
            | grep -v '^DOPPLER_' \
            | grep -v '^PORT=' \
            | paste -sd, -)
          gcloud run services update ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --set-env-vars "$SECRETS" \
            --quiet

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          image: ${{ env.REGISTRY }}/worker:${{ github.sha }}
          region: ${{ env.REGION }}
