services:
  migrate:
    build:
      context: ../../..
      dockerfile: services/api/Dockerfile.dev
    command: >
      migrate
        -path /app/services/api/internal/db/migrations
        -database postgres://zagforge:zagforge@postgres:5432/zagforge?sslmode=disable
        up
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ../../..
      dockerfile: services/api/Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ../../..:/app
    environment:
      # Docker-network overrides (Doppler has localhost versions).
      DATABASE_URL: postgres://zagforge:zagforge@postgres:5432/zagforge?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      GCS_ENDPOINT: http://fake-gcs:4443/storage/v1/
      # All other secrets injected by Doppler via `doppler run --`.
      APP_ENV: ${APP_ENV}
      PORT: ${PORT}
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
      GITHUB_APP_WEBHOOK_SECRET: ${GITHUB_APP_WEBHOOK_SECRET}
      JWT_PUBLIC_KEY_BASE64: ${JWT_PUBLIC_KEY_BASE64}
      JWT_ISSUER: "http://localhost:8081"
      HMAC_SIGNING_KEY: ${HMAC_SIGNING_KEY}
      WATCHDOG_SECRET: ${WATCHDOG_SECRET}
      ENCRYPTION_KEY_BASE64: ${ENCRYPTION_KEY_BASE64}
      CLI_API_KEY: ${CLI_API_KEY}
      GCS_BUCKET: ${GCS_BUCKET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/readyz || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fake-gcs:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  auth-migrate:
    build:
      context: ../../..
      dockerfile: services/auth/Dockerfile.dev
    command: >
      migrate
        -path /app/services/auth/internal/db/migrations
        -database postgres://zagforge:zagforge@postgres:5432/zagforge_auth?sslmode=disable
        up
    depends_on:
      postgres:
        condition: service_healthy

  auth:
    build:
      context: ../../..
      dockerfile: services/auth/Dockerfile.dev
    ports:
      - "8081:8081"
    volumes:
      - ../../..:/app
    environment:
      AUTH_DATABASE_URL: postgres://zagforge:zagforge@postgres:5432/zagforge_auth?sslmode=disable
      REDIS_URL: redis://redis:6379/1
      APP_ENV: ${APP_ENV}
      PORT: "8081"
      JWT_PRIVATE_KEY_BASE64: ${JWT_PRIVATE_KEY_BASE64}
      JWT_PUBLIC_KEY_BASE64: ${JWT_PUBLIC_KEY_BASE64}
      JWT_ISSUER: "http://localhost:8081"
      JWT_ACCESS_TOKEN_TTL: "15m"
      JWT_REFRESH_TOKEN_TTL: "168h"
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      OAUTH_CALLBACK_BASE_URL: "http://localhost:8081"
      ENCRYPTION_KEY_BASE64: ${ENCRYPTION_KEY_BASE64}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3002}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SESSION_MAX_AGE: "720h"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/readyz || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: ../../..
      dockerfile: services/worker/Dockerfile.dev
    volumes:
      - ../../..:/app
      - ../../../.reports:/data/reports
    environment:
      # Docker-network overrides.
      DATABASE_URL: postgres://zagforge:zagforge@postgres:5432/zagforge?sslmode=disable
      GCS_ENDPOINT: http://fake-gcs:4443/storage/v1/
      API_BASE_URL: http://api:8080
      # Doppler-injected.
      APP_ENV: ${APP_ENV}
      REPORTS_DIR: /data/reports
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
      GITHUB_APP_WEBHOOK_SECRET: ${GITHUB_APP_WEBHOOK_SECRET}
      GCS_BUCKET: ${GCS_BUCKET}
      HMAC_SIGNING_KEY: ${HMAC_SIGNING_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      fake-gcs:
        condition: service_healthy
      api:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
