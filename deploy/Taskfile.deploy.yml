version: "3"

vars:
    ENV: '{{.ENV | default "dev"}}'
    # Map task ENV to Doppler config names.
    DOPPLER_CONFIG: '{{if eq .ENV "prod"}}prd{{else if eq .ENV "staging"}}stg{{else}}dev{{end}}'
    PROJECT_ID:
        sh: grep '^project_id' infra/terraform/envs/{{.ENV}}.tfvars | sed 's/.*= *"\(.*\)"/\1/'
    REGION:
        sh: grep '^region' infra/terraform/envs/{{.ENV}}.tfvars | sed 's/.*= *"\(.*\)"/\1/'
    REGISTRY: "{{.REGION}}-docker.pkg.dev/{{.PROJECT_ID}}/zagforge"

tasks:
    sync-secrets:
        desc: "Sync Doppler secrets to a Cloud Run service. Usage: task deploy:sync-secrets SERVICE=api [ENV=dev]"
        requires:
            vars: [SERVICE]
        cmds:
            - echo "Syncing Doppler ({{.DOPPLER_CONFIG}}) → zagforge-{{.SERVICE}} in {{.ENV}}..."
            - |
                # Fetch secrets from Doppler as KEY=VALUE pairs.
                # Exclude Doppler metadata and PORT (reserved by Cloud Run).
                SECRETS=$(doppler secrets download \
                  --project zagforge \
                  --config {{.DOPPLER_CONFIG}} \
                  --format env-no-quotes \
                  --no-file 2>/dev/null \
                  | grep -v '^DOPPLER_' \
                  | grep -v '^PORT=' \
                  | paste -sd, -)
                gcloud run services update zagforge-{{.SERVICE}} \
                  --region {{.REGION}} \
                  --project {{.PROJECT_ID}} \
                  --set-env-vars "$SECRETS"
            - echo "Done. Secrets synced to zagforge-{{.SERVICE}}."

    sync-all:
        desc: "Sync Doppler secrets to API, Auth, and Worker. Usage: task deploy:sync-all [ENV=dev]"
        cmds:
            - task: sync-secrets
              vars: { SERVICE: api }
            - task: sync-secrets
              vars: { SERVICE: auth }
            - task: sync-secrets
              vars: { SERVICE: worker }

    ship:
        desc: "Trigger GitHub Actions deploy. Usage: task deploy:ship SERVICE=api [ENV=dev]"
        requires:
            vars: [SERVICE]
        cmds:
            - echo "Triggering deploy for {{.SERVICE}} to {{.ENV}}..."
            - gh workflow run deploy-{{.SERVICE}}.yml --ref main -f environment={{.ENV}}
            - echo "Deploy triggered. Watch at https://github.com/LegationPro/zagforge-mvp/actions"

    ship:all:
        desc: "Deploy API, Auth, and Worker. Usage: task deploy:ship:all [ENV=dev]"
        cmds:
            - task: ship
              vars: { SERVICE: api }
            - task: ship
              vars: { SERVICE: auth }
            - task: ship
              vars: { SERVICE: worker }

    image-push:
        desc: "Build and push a service image. Usage: task deploy:image-push SERVICE=api [ENV=prod]"
        requires:
            vars: [SERVICE]
        vars:
            COMMIT:
                sh: git rev-parse HEAD
        cmds:
            - docker build --platform linux/amd64 -f services/{{.SERVICE}}/Dockerfile -t {{.REGISTRY}}/{{.SERVICE}}:{{.COMMIT}} .
            - docker push {{.REGISTRY}}/{{.SERVICE}}:{{.COMMIT}}

    deploy:
        desc: "Deploy a Cloud Run service with Doppler secrets. Usage: task deploy:deploy SERVICE=api [ENV=prod] [COMMIT=abc123]"
        requires:
            vars: [SERVICE]
        vars:
            COMMIT:
                sh: git rev-parse HEAD
        cmds:
            - echo "Deploying {{.SERVICE}} at {{.COMMIT}} to {{.ENV}} ({{.PROJECT_ID}} / {{.REGION}})..."
            - |
                SECRETS=$(doppler secrets download \
                  --project zagforge \
                  --config {{.DOPPLER_CONFIG}} \
                  --format env-no-quotes \
                  --no-file 2>/dev/null \
                  | grep -v '^DOPPLER_' \
                  | grep -v '^PORT=' \
                  | paste -sd, -)
                gcloud run deploy zagforge-{{.SERVICE}} \
                  --image {{.REGISTRY}}/{{.SERVICE}}:{{.COMMIT}} \
                  --region {{.REGION}} \
                  --project {{.PROJECT_ID}} \
                  --set-env-vars "$SECRETS"

    deploy-job:
        desc: "Deploy a Cloud Run job. Usage: task deploy:deploy-job SERVICE=worker [ENV=prod] [COMMIT=abc123]"
        requires:
            vars: [SERVICE]
        vars:
            COMMIT:
                sh: git rev-parse HEAD
        cmds:
            - echo "Deploying job {{.SERVICE}} at {{.COMMIT}} to {{.ENV}} ({{.PROJECT_ID}} / {{.REGION}})..."
            - >
                gcloud run jobs update zagforge-{{.SERVICE}}
                --image {{.REGISTRY}}/{{.SERVICE}}:{{.COMMIT}}
                --region {{.REGION}}
                --project {{.PROJECT_ID}}

    revisions:
        desc: "List recent revisions. Usage: task deploy:revisions SERVICE=api [ENV=prod]"
        requires:
            vars: [SERVICE]
        cmds:
            - >
                gcloud run revisions list
                --service zagforge-{{.SERVICE}}
                --region {{.REGION}}
                --project {{.PROJECT_ID}}
                --sort-by ~creationTimestamp
                --limit 10

    rollback:
        desc: "Rollback to a revision. Usage: task deploy:rollback SERVICE=api REVISION=zagforge-api-00042-abc [ENV=prod]"
        requires:
            vars: [SERVICE, REVISION]
        cmds:
            - echo "Rolling back {{.SERVICE}} to {{.REVISION}} in {{.ENV}}..."
            - >
                gcloud run services update-traffic zagforge-{{.SERVICE}}
                --to-revisions {{.REVISION}}=100
                --region {{.REGION}}
                --project {{.PROJECT_ID}}

    canary:
        desc: "Route % traffic to latest. Usage: task deploy:canary SERVICE=api PERCENT=10 [ENV=prod]"
        requires:
            vars: [SERVICE, PERCENT]
        cmds:
            - echo "Routing {{.PERCENT}}% traffic to latest revision of {{.SERVICE}} in {{.ENV}}..."
            - >
                gcloud run services update-traffic zagforge-{{.SERVICE}}
                --to-latest
                --to-percentage {{.PERCENT}}
                --region {{.REGION}}
                --project {{.PROJECT_ID}}

    status:
        desc: "Show traffic split. Usage: task deploy:status SERVICE=api [ENV=prod]"
        requires:
            vars: [SERVICE]
        cmds:
            - >
                gcloud run services describe zagforge-{{.SERVICE}}
                --region {{.REGION}}
                --project {{.PROJECT_ID}}
                --format "yaml(status.traffic)"

    logs:
        desc: "Show recent Cloud Run logs. Usage: task deploy:logs SERVICE=api [ENV=prod]"
        requires:
            vars: [SERVICE]
        cmds:
            - >
                gcloud logging read
                "resource.type=cloud_run_revision AND resource.labels.service_name=zagforge-{{.SERVICE}}"
                --project {{.PROJECT_ID}}
                --limit 50
                --format "table(timestamp, severity, textPayload)"

    tf:plan:
        desc: "Terraform plan. Usage: task deploy:tf:plan [ENV=staging]"
        cmds:
            - cd infra/terraform && terraform plan -var-file=envs/{{.ENV}}.tfvars

    tf:apply:
        desc: "Terraform apply. Usage: task deploy:tf:apply [ENV=staging]"
        cmds:
            - cd infra/terraform && terraform apply -var-file=envs/{{.ENV}}.tfvars

    tf:output:
        desc: Show Terraform outputs
        cmds:
            - cd infra/terraform && terraform output
